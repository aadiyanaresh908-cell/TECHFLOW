<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | TechFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#contact-form" class="skip-link">Skip to form</a>

    <header>
        <nav aria-label="Main Navigation">
            <div class="logo">TECH<span>FLOW</span></div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main id="contact-form">
        <section class="contact-header">
            <h1>Get in <span class="gradient-text">Touch</span></h1>
            <p>We’d love to hear from you. Fill out the form below.</p>
        </section>

        <section class="form-wrapper">
            <form action="#" class="styled-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="cta-button">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TechFlow Dynamics.</p>
    </footer>
</body>
</html>
